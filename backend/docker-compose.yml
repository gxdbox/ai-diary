version: '3.8'

services:
  backend:
    build: .
    container_name: ai-diary-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./ai_diary.db:/app/ai_diary.db
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:///./ai_diary.db
      - CHROMA_PERSIST_DIR=./data/chroma_data
    restart: unless-stopped

volumes:
  data: